<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Admin-Dashboard</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="style.css" />
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
		/>
		<style>
			.material-symbols-outlined {
				font-variation-settings:
					"FILL" 1,
					"wght" 400,
					"GRAD" 0,
					"opsz" 48;
			}
		</style>
	</head>
	<body>
		<div id="container">
			<header style="grid-area: header">
				<div id="searchbar" style="grid-area: searchbar"></div>
				<div id="profile" style="grid-area: profile"></div>
			</header>
			<div id="dashboard" style="grid-area: dashboard">
				<ul>
					<li>
						<a href="#"><span class="material-symbols-outlined"> dashboard </span>Dashboard</a>
					</li>
				</ul>
				<ul>
					<li>
						<a href="#"><span class="material-symbols-outlined"> home </span>Home</a>
					</li>
					<li>
						<a href="#"><span class="material-symbols-outlined"> account_box </span>Profile</a>
					</li>
					<li>
						<a href="#"><span class="material-symbols-outlined"> chat_bubble </span>Message</a>
					</li>
					<li>
						<a href="#"><span class="material-symbols-outlined"> history </span>History</a>
					</li>
					<li>
						<a href="#"><span class="material-symbols-outlined"> file_copy </span>Tasks</a>
					</li>
					<li>
						<a href="#"><span class="material-symbols-outlined"> groups </span>Communities</a>
					</li>
				</ul>
				<ul>
					<li>
						<a href="#"><span class="material-symbols-outlined"> settings </span>Settings</a>
					</li>
					<li>
						<a href="#"><span class="material-symbols-outlined"> contact_support </span>Support</a>
					</li>
					<li>
						<a href="#"><span class="material-symbols-outlined"> privacy_tip </span>Privacy</a>
					</li>
				</ul>
			</div>
			<main style="grid-area: main"></main>
		</div>
		<script src="index.js" async defer></script>
	</body>
</html>
